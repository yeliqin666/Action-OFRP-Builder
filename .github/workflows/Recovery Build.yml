name: Recovery Build

on:
  workflow_dispatch:
    inputs:
      SYNC_URL:
        description: 'SYNC_URL'
        required: true
        default: 'https://gitlab.com/OrangeFox/sync.git'
      MANIFEST_BRANCH:
        description: 'MANIFEST_BRANCH'
        required: true
        default: '14.1'
      DEVICE_TREE_URL:
        description: 'DEVICE_TREE_URL'
        required: true
        default: 'https://github.com/yeliqin666/android_device_xiaomi_lmi'
      DEVICE_TREE_BRANCH:
        description: 'DEVICE_TREE_BRANCH'
        required: true
        default: 'fox_14.1'
      DEVICE_PATH:
        description: 'DEVICE_PATH'
        required: true
        default: 'device/xiaomi/umi'
      COMMON_TREE_URL:
        description: 'COMMON_TREE_URL (if no common tree, leave blank)'
        required: false
      COMMON_PATH:
        description: 'COMMON_PATH (if no common tree, leave blank)'
        required: false
      DEVICE_NAME:
        description: 'DEVICE_NAME'
        required: true
        default: 'lmi'
      MAKEFILE_NAME:
        description: 'MAKEFILE_NAME'
        required: true
        default: 'twrp_lmi'
      BUILD_TARGET:
        description: 'BUILD_TARGET'
        required: true
        default: 'recovery'

jobs:
  build:
    if: github.event.repository.owner.id == github.event.sender.id
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
 
    # You might want to Checkout your repo first, but not mandatory
    - name: Check Out
      uses: actions/checkout@v4

    # Cleanup The Actions Workspace Using Custom Composite Run Actions
    - name: Cleanup
      uses: rokibhasansagar/slimhub_actions@main

    - name: Initialize workspace
      run: |
        mkdir workspace
        cd workspace
        echo "workspace-folder=$(pwd)" >> $GITHUB_OUTPUT
      id: pwd

    - name: Prepare the build environment
      run: |
        sudo apt install git aria2 -y
        git clone https://gitlab.com/OrangeFox/misc/scripts
        cd scripts
        sudo bash setup/android_build_env.sh
        sed -i 's/cd -/cd ../g' setup/install_android_sdk.sh
        sudo bash setup/install_android_sdk.sh
      working-directory: ${{ steps.pwd.outputs.workspace-folder }}

    - name: Sync OrangeFox sources and minimal manifest
      run: |
        cd ${{ steps.pwd.outputs.workspace-folder }}
        git clone ${{ github.event.inputs.SYNC_URL }}
        cd sync
        ./orangefox_sync.sh --branch ${{ github.event.inputs.MANIFEST_BRANCH }} --path ${{ steps.pwd.outputs.workspace-folder }}/fox_${{ github.event.inputs.MANIFEST_BRANCH }}
      working-directory: ${{ steps.pwd.outputs.workspace-folder }}

    - name: Switch vendor/recovery to R12 branch
      run: |
        cd ${{ steps.pwd.outputs.workspace-folder }}/fox_${{ github.event.inputs.MANIFEST_BRANCH }}
        VENDOR_DIR="vendor/recovery"
        if [ "${{ github.event.inputs.MANIFEST_BRANCH }}" = "14.1" ]; then
          R12_BRANCH="fox_14.1-R12-new"
        elif [ "${{ github.event.inputs.MANIFEST_BRANCH }}" = "12.1" ]; then
          R12_BRANCH="fox_12.1-R12-new"
        else
          echo "[WARN] Unknown manifest branch, skipping R12 vendor switch"
          exit 0
        fi
        echo "[INFO] Switching $VENDOR_DIR from fox_${{ github.event.inputs.MANIFEST_BRANCH }} to $R12_BRANCH"
        cd "$VENDOR_DIR"
        git fetch origin "$R12_BRANCH"
        git checkout "$R12_BRANCH"
        echo "[INFO] vendor/recovery now on $(git branch --show-current) @ $(git log --oneline -1)"
      working-directory: ${{ steps.pwd.outputs.workspace-folder }}

    - name: Patch openaes for modern clang (C23 prototype rules)
      run: |
        cd ${{ steps.pwd.outputs.workspace-folder }}/fox_${{ github.event.inputs.MANIFEST_BRANCH }}
        python3 - <<'PY'
        from pathlib import Path
        import re

        base = Path('bootable/recovery/openaes/src/isaac')
        rand_h = base / 'rand.h'
        rand_c = base / 'rand.c'

        h = rand_h.read_text(encoding='utf-8')
        h = re.sub(r'void\s+randinit\s*\(/\*_\s*randctx\s*\*r,\s*word\s*flag\s*_\*/\s*\);', 'void randinit(randctx *r, word flag);', h)
        h = re.sub(r'void\s+isaac\s*\(/\*_\s*randctx\s*\*r\s*_\*/\s*\);', 'void isaac(randctx *r);', h)
        rand_h.write_text(h, encoding='utf-8')

        c = rand_c.read_text(encoding='utf-8')
        c = re.sub(r'void\s+isaac\s*\(\s*ctx\s*\)\s*\n\s*randctx\s*\*\s*ctx\s*;', 'void isaac(randctx *ctx)', c)
        c = re.sub(r'void\s+randinit\s*\(\s*ctx\s*,\s*flag\s*\)\s*\n\s*randctx\s*\*\s*ctx\s*;\s*\n\s*word\s+flag\s*;', 'void randinit(randctx *ctx, word flag)', c)
        rand_c.write_text(c, encoding='utf-8')

        if 'void randinit(randctx *r, word flag);' not in h or 'void isaac(randctx *r);' not in h:
            raise SystemExit('Patch failed: rand.h prototype replacement did not apply')
        if 'void isaac(randctx *ctx)' not in c or 'void randinit(randctx *ctx, word flag)' not in c:
            raise SystemExit('Patch failed: rand.c prototype replacement did not apply')

        print('Patched:', rand_h)
        print('Patched:', rand_c)
        PY
      working-directory: ${{ steps.pwd.outputs.workspace-folder }}

    - name: Patch system/vold for metadata+FBE decryption fix
      run: |
        cd ${{ steps.pwd.outputs.workspace-folder }}/fox_${{ github.event.inputs.MANIFEST_BRANCH }}
        cd system/vold
        echo "[INFO] Current vold HEAD: $(git log --oneline -1)"
        # Commit any uncommitted OrangeFox patches so cherry-pick can proceed
        git config user.email "ci@orangefox.build"
        git config user.name "OrangeFox CI"
        git add -A
        git diff --cached --quiet || git commit -m "OrangeFox: auto-commit local patches" --no-verify
        echo "[INFO] After OrangeFox commit: $(git log --oneline -1)"
        git fetch --depth=50 https://github.com/yeliqin666/android_system_vold.git orangefox-14.1-lmi-decrypt-fixes
        echo "[INFO] FETCH_HEAD: $(git log --oneline -1 FETCH_HEAD)"
        git cherry-pick FETCH_HEAD --no-edit
        echo "[INFO] system/vold patched. New HEAD:"
        git log --oneline -5
      working-directory: ${{ steps.pwd.outputs.workspace-folder }}

    - name: Clone device tree
      run: |
        cd ${{ steps.pwd.outputs.workspace-folder }}/fox_${{ github.event.inputs.MANIFEST_BRANCH }}
        git clone ${{ github.event.inputs.DEVICE_TREE_URL }} -b ${{ github.event.inputs.DEVICE_TREE_BRANCH }} ./${{ github.event.inputs.DEVICE_PATH }}
      working-directory: ${{ steps.pwd.outputs.workspace-folder }}

    - name: Clone common tree
      if: |
        github.event.inputs.COMMON_TREE_URL != ''
        && github.event.inputs.COMMON_PATH != ''
      run: |
        cd ${{ steps.pwd.outputs.workspace-folder }}/fox_${{ github.event.inputs.MANIFEST_BRANCH }}
        git clone ${{ github.event.inputs.COMMON_TREE_URL }} -b ${{ github.event.inputs.DEVICE_TREE_BRANCH }} ./${{ github.event.inputs.COMMON_PATH }}
      working-directory: ${{ steps.pwd.outputs.workspace-folder }}

    - name: Set Swap Space
      uses: pierotofy/set-swap-space@master
      with:
        swap-size-gb: 24

    - name: Building recovery
      run: |
        cd ${{ steps.pwd.outputs.workspace-folder }}/fox_${{ github.event.inputs.MANIFEST_BRANCH }}
        export JAVA_HOME="$(dirname "$(dirname "$(readlink -f "$(command -v javac)")")")"
        export PATH="$JAVA_HOME/bin:$PATH"
        set +e
        source build/envsetup.sh
        export ALLOW_MISSING_DEPENDENCIES=true
        export LC_ALL=C
        export FOX_BUILD_DEVICE=${{ github.event.inputs.DEVICE_NAME }}
        set -e
        PRODUCT=${{ github.event.inputs.MAKEFILE_NAME }}
        LUNCH_COMBO=""
        for RELEASE in ap2a trunk_staging; do
          if lunch ${PRODUCT}-${RELEASE}-eng; then
            LUNCH_COMBO="${PRODUCT}-${RELEASE}-eng"
            break
          fi
        done

        if [ -z "$LUNCH_COMBO" ]; then
          echo "[FATAL] No valid lunch combo found for ${PRODUCT}"
          exit 1
        fi

        echo "[INFO] Using lunch combo: ${LUNCH_COMBO}"
        mka adbd ${{ github.event.inputs.BUILD_TARGET }}image -j$(nproc --all)
      working-directory: ${{ steps.pwd.outputs.workspace-folder }}

    - name: Check the output directory before uploading
      id: output
      run: |
        PRODUCT_DIR=${{ steps.pwd.outputs.workspace-folder }}/fox_${{ github.event.inputs.MANIFEST_BRANCH }}/out/target/product
        ls -al "$PRODUCT_DIR"/
        # Auto-detect actual product subdirectory (PRODUCT_DEVICE may differ from DEVICE_NAME)
        ACTUAL_DEVICE=$(ls -d "$PRODUCT_DIR"/*/ | head -1 | xargs basename)
        echo "actual_device=$ACTUAL_DEVICE" >> $GITHUB_OUTPUT
        echo "[INFO] Detected product device: $ACTUAL_DEVICE"
        ls -al "$PRODUCT_DIR/$ACTUAL_DEVICE/"

    - name: Upload to Release
      uses: softprops/action-gh-release@v1
      with:
        files: |
          ${{ steps.pwd.outputs.workspace-folder }}/fox_${{ github.event.inputs.MANIFEST_BRANCH }}/out/target/product/${{ steps.output.outputs.actual_device }}/*.img
          ${{ steps.pwd.outputs.workspace-folder }}/fox_${{ github.event.inputs.MANIFEST_BRANCH }}/out/target/product/${{ steps.output.outputs.actual_device }}/*.zip
        name: ${{ github.event.inputs.DEVICE_NAME }}-${{ github.run_id }}
        tag_name: ${{ github.run_id }}
        body: |
          Manifest: ${{ github.event.inputs.MANIFEST_BRANCH }}
          Device: ${{ github.event.inputs.DEVICE_NAME }}
          Target: ${{ github.event.inputs.BUILD_TARGET }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
